<!DOCTYPE html>
<html lang="en" data-theme="light" data-dir="ltr">
<head>
<meta charset="UTF-8">
<!-- v2.8.78 — a11y fix: removed maximum-scale=1.0 + user-scalable=no.
     Blocking zoom is a WCAG violation (users with low vision must be able
     to zoom). The double-tap zoom issue on iOS that those attrs were added
     for is acceptable trade-off vs accessibility. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f9d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="ProChefDesk — know the true cost of every plate. Food costing, events, HACCP and inventory for restaurants, cafés and caterers.">

<!-- v2.9.28 — CSP meta tag KALDIRILDI. v2.9.24'te eklenmişti ama hCaptcha
     widget'ı + Discover foto görüntüsü için sürekli sorun çıkarıyordu.
     Operatör solo kullanıcı; XSS / CSP gibi koruma katmanları yararlıdan
     fazla zaman kaybettiriyordu. X-Content-Type-Options + Referrer-Policy
     standart browser default'larıyla yeterli — meta tag REMOVED.
     Gelecekte tekrar denenirse: önce hCaptcha + Discover photo'larda
     uçtan-uca test edilmeli. -->
<title>ProChefDesk — Kitchen Management System</title>

<!-- Favicon (inline SVG, no external dependency) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5.5' fill='%231f9d6b'/%3E%3Cg transform='translate(2.4 2.4) scale(0.8)'%3E%3Cpath d='M6.5 13.6 C5 13 4.2 11.6 4.5 10 C4.6 9.3 5 8.6 5.7 8.2 C5.4 7 6 6.1 7 5.8 C7 4.6 7.8 3.8 9 3.8 C9.3 2.8 10.5 2.2 12 2.2 C13.5 2.2 14.7 2.8 15 3.8 C16.2 3.8 17 4.6 17 5.8 C18 6.1 18.6 7 18.3 8.2 C19 8.6 19.4 9.3 19.5 10 C19.8 11.6 19 13 17.5 13.6 Z' fill='%23fff'/%3E%3Cpath d='M6.3 13.6 L17.7 13.6 L17.7 19.3 C17.7 20.2 17 21 16.1 21 L7.9 21 C7 21 6.3 20.2 6.3 19.3 Z' fill='%23fff'/%3E%3Cpath d='M8 13.4 C7.7 10.4 8 7.4 8.9 5 M10 13.5 C9.9 10 10 6.6 10.5 3.4 M12 13.5 V2.6 M14 13.5 C14.1 10 14 6.6 13.5 3.4 M16 13.4 C16.3 10.4 16 7.4 15.1 5' stroke='%2316433a' stroke-width='0.5' stroke-linecap='round' fill='none'/%3E%3C/g%3E%3C/svg%3E">

<!-- iOS home-screen icon (Safari ignores manifest icons; uses this) -->
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180.png">

<!-- PWA manifest (real file — v2.6.70). The previous data-URL manifest
     was rejected by some iOS Safari versions, blocking install. -->
<link rel="manifest" href="manifest.webmanifest">

<!-- Google Fonts - Inter (UI) + Fraunces (display headings, v2.44 Deep Pine) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">

<!-- v2.8.76 — Boot performance L1: preconnect + preload the two
     CDN dependencies so their download starts in parallel with CSS,
     instead of blocking after the document parser reaches them at the
     bottom of body. Network tab will show them resolving alongside
     the stylesheets. Combined with `defer` on every local <script>
     tag below, this cuts mobile FCP from ~5.6s to ~3.0-3.5s on 4G. -->
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js" crossorigin>
<!-- v2.8.78 — xlsx-js-style preload kaldırıldı. Artık on-demand
     yükleniyor (PCD.loadXLSX helper, sadece export/import tıklandığında). -->


<!-- Stylesheets: cache-bust with ?v=__VERSION__ on deploy -->
<link rel="stylesheet" href="css/core.css?v=__VERSION__">
<link rel="stylesheet" href="css/components.css?v=__VERSION__">
<link rel="stylesheet" href="css/mobile.css?v=__VERSION__">
<link rel="stylesheet" href="css/themes.css?v=__VERSION__">
<link rel="stylesheet" href="css/print.css?v=__VERSION__">

<!-- hCaptcha (v2.6.83) — bot protection for the "Report an issue" form.
     Loaded lazily by js/tools/account.js when the modal opens, so it
     doesn't add network cost or third-party JS to first paint. -->
</head>
<body>

<!-- ============= SPLASH (shows while JS loads) ============= -->
<div id="splash" class="splash">
  <div class="splash-logo">
    <div class="splash-mark"><svg viewBox="0 0 24 24" fill="none" style="width:60%;height:60%" aria-hidden="true"><path d="M6.5 13.6 C5 13 4.2 11.6 4.5 10 C4.6 9.3 5 8.6 5.7 8.2 C5.4 7 6 6.1 7 5.8 C7 4.6 7.8 3.8 9 3.8 C9.3 2.8 10.5 2.2 12 2.2 C13.5 2.2 14.7 2.8 15 3.8 C16.2 3.8 17 4.6 17 5.8 C18 6.1 18.6 7 18.3 8.2 C19 8.6 19.4 9.3 19.5 10 C19.8 11.6 19 13 17.5 13.6 Z" fill="#fff"/><path d="M6.3 13.6 L17.7 13.6 L17.7 19.3 C17.7 20.2 17 21 16.1 21 L7.9 21 C7 21 6.3 20.2 6.3 19.3 Z" fill="#fff"/><path d="M8 13.4 C7.7 10.4 8 7.4 8.9 5 M10 13.5 C9.9 10 10 6.6 10.5 3.4 M12 13.5 V2.6 M14 13.5 C14.1 10 14 6.6 13.5 3.4 M16 13.4 C16.3 10.4 16 7.4 15.1 5" stroke="#16433a" stroke-width="0.5" stroke-linecap="round" fill="none"/></svg></div>
    <div class="splash-name">ProChefDesk</div>
    <div class="splash-tag">Know the true cost of every plate</div>
  </div>
  <div class="splash-spinner"></div>
</div>

<!-- ============= APP ROOT (hidden until ready) ============= -->
<div id="app" class="app hidden">

  <!-- ===== TOP BAR (desktop + mobile) ===== -->
  <header id="topbar" class="topbar">
    <button id="btnMenu" class="icon-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
    </button>
    <div class="topbar-brand" data-nav="dashboard">
      <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" style="width:62%;height:62%" aria-hidden="true"><path d="M6.5 13.6 C5 13 4.2 11.6 4.5 10 C4.6 9.3 5 8.6 5.7 8.2 C5.4 7 6 6.1 7 5.8 C7 4.6 7.8 3.8 9 3.8 C9.3 2.8 10.5 2.2 12 2.2 C13.5 2.2 14.7 2.8 15 3.8 C16.2 3.8 17 4.6 17 5.8 C18 6.1 18.6 7 18.3 8.2 C19 8.6 19.4 9.3 19.5 10 C19.8 11.6 19 13 17.5 13.6 Z" fill="#fff"/><path d="M6.3 13.6 L17.7 13.6 L17.7 19.3 C17.7 20.2 17 21 16.1 21 L7.9 21 C7 21 6.3 20.2 6.3 19.3 Z" fill="#fff"/><path d="M8 13.4 C7.7 10.4 8 7.4 8.9 5 M10 13.5 C9.9 10 10 6.6 10.5 3.4 M12 13.5 V2.6 M14 13.5 C14.1 10 14 6.6 13.5 3.4 M16 13.4 C16.3 10.4 16 7.4 15.1 5" stroke="#16433a" stroke-width="0.5" stroke-linecap="round" fill="none"/></svg></span>
      <span class="brand-name">ProChefDesk</span>
    </div>
    <button id="wsSwitcher" class="ws-switcher" aria-label="Switch workspace">
      <span class="ws-dot" id="wsDot"></span>
      <span class="ws-name" id="wsName">My Kitchen</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="topbar-actions">
      <button id="btnSync" class="icon-btn" aria-label="Sync status" title="Sync status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 3v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btnTheme" class="icon-btn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btnLang" class="icon-btn lang-btn" aria-label="Change language">
        <span id="langLabel">EN</span>
      </button>
      <button id="btnUser" class="icon-btn user-btn" aria-label="Account">
        <span id="userAvatar">👤</span>
      </button>
    </div>
  </header>

  <!-- ===== SIDE NAV (desktop slides in) ===== -->
  <nav id="sidenav" class="sidenav">
    <div class="sidenav-backdrop" data-close-sidenav></div>
    <div class="sidenav-panel">
      <div class="sidenav-header">
        <div class="sidenav-brand">
          <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" style="width:62%;height:62%" aria-hidden="true"><path d="M6.5 13.6 C5 13 4.2 11.6 4.5 10 C4.6 9.3 5 8.6 5.7 8.2 C5.4 7 6 6.1 7 5.8 C7 4.6 7.8 3.8 9 3.8 C9.3 2.8 10.5 2.2 12 2.2 C13.5 2.2 14.7 2.8 15 3.8 C16.2 3.8 17 4.6 17 5.8 C18 6.1 18.6 7 18.3 8.2 C19 8.6 19.4 9.3 19.5 10 C19.8 11.6 19 13 17.5 13.6 Z" fill="#fff"/><path d="M6.3 13.6 L17.7 13.6 L17.7 19.3 C17.7 20.2 17 21 16.1 21 L7.9 21 C7 21 6.3 20.2 6.3 19.3 Z" fill="#fff"/><path d="M8 13.4 C7.7 10.4 8 7.4 8.9 5 M10 13.5 C9.9 10 10 6.6 10.5 3.4 M12 13.5 V2.6 M14 13.5 C14.1 10 14 6.6 13.5 3.4 M16 13.4 C16.3 10.4 16 7.4 15.1 5" stroke="#16433a" stroke-width="0.5" stroke-linecap="round" fill="none"/></svg></span>
          <span>ProChefDesk</span>
        </div>
        <button class="icon-btn" data-close-sidenav aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="sidenav-items" id="sidenavItems"><!-- populated by app.js --></div>
      <div class="sidenav-footer">
        <!-- Premium UI is hidden until Stripe tier launches. JS in app.js
             also enforces display:none, but inline style prevents the
             "flash of unstyled content" on first paint. When premium
             ships, remove these `style="display:none"` attributes and
             unblock the JS hide in updatePlanBadge(). -->
        <div id="planBadge" class="plan-badge plan-free" style="display:none;">Free Plan</div>
        <button id="btnUpgrade" class="btn btn-primary btn-sm w-full" data-i18n="upgrade_to_pro" style="display:none;">Upgrade to Pro</button>
        <div class="sidenav-legal" style="margin-top:10px;text-align:center;font-size:11px;color:var(--text-3);line-height:1.5;">
          <a href="/privacy.html" target="_blank" rel="noopener" data-i18n="legal_privacy" style="color:var(--text-3);text-decoration:none;">Privacy</a>
          <span style="margin:0 4px;">·</span>
          <a href="/terms.html" target="_blank" rel="noopener" data-i18n="legal_terms" style="color:var(--text-3);text-decoration:none;">Terms</a>
          <div style="margin-top:2px;opacity:0.7;">v__VERSION__</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT AREA ===== -->
  <main id="main" class="main">
    <div id="view" class="view"><!-- current view is rendered here --></div>
  </main>

  <!-- ===== MOBILE BOTTOM NAV ===== -->
  <nav id="bottomnav" class="bottomnav">
    <button class="bn-item active" data-nav="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_home">Home</span>
    </button>
    <button class="bn-item" data-nav="recipes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_recipes">Recipes</span>
    </button>
    <button class="bn-item bn-center" id="bnCreateBtn" type="button" aria-label="Create new">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
    </button>
    <button class="bn-item" data-nav="kitchen_cards">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 9h18M8 14h2M8 17h6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_kitchen_cards">Cards</span>
    </button>
    <button class="bn-item" data-nav="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4"/></svg>
      <span data-i18n="nav_account">Me</span>
    </button>
  </nav>

  <!-- ===== MODAL STACK HOST ===== -->
  <div id="modalStack" class="modal-stack"></div>

  <!-- ===== TOAST HOST ===== -->
  <div id="toastHost" class="toast-host"></div>

  <!-- ===== OFFLINE BANNER ===== -->
  <div id="offlineBanner" class="offline-banner hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.58 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span data-i18n="offline_mode">Offline — changes will sync when you're back online</span>
  </div>

</div>

<!-- ===== Supabase JS (loaded from CDN, small and cached) ===== -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>

     LCP -1s tahmini etki). -->


<!-- ===== Core modules (order matters) ===== -->
<script defer src="js/core/config.js?v=__VERSION__"></script>
<script defer src="js/core/utils.js?v=__VERSION__"></script>
<script defer src="js/core/idb-wrapper.js?v=__VERSION__"></script>
<script defer src="js/core/store.js?v=__VERSION__"></script>

<script defer src="js/core/gate.js?v=__VERSION__"></script>
<script defer src="js/core/i18n.js?v=__VERSION__"></script>
<!-- v2.8.78 — Lazy i18n: sadece en.js boot'ta yüklenir (fallback dictionary
     + default locale). Diğer 5 dil ilk kullanımda PCD.i18n.setLocale()

<script defer src="js/i18n/en.js?v=__VERSION__"></script>
<script defer src="js/core/allergens-db.js?v=__VERSION__"></script>

<script defer src="js/ui/modal.js?v=__VERSION__"></script>
<script defer src="js/ui/toast.js?v=__VERSION__"></script>
<script defer src="js/ui/tutorial.js?v=__VERSION__"></script>

<script defer src="js/ui/dragdrop.js?v=__VERSION__"></script>

<!-- Seed data -->
<script defer src="js/seed/demo-recipes.js?v=__VERSION__"></script>

<!-- v2.8.78 — Tools: yalnızca boot için kritik 3 tool eager. Dashboard +
     account boot için zorunlu; inventory dashboard low-stock alert için
     gerekli (computeStatus sync çağırılır). Diğer 16 tool router'a
     `registerLazy` ile kayıtlı, ilk navigation'da dynamic script tag
     ile çekilir. Etki: initial bundle ~450 KB azaldı, LCP -1.2 sn
     tahmini. Cached navigation instant. -->
<script defer src="js/tools/dashboard.js?v=__VERSION__"></script>
<script defer src="js/tools/account.js?v=__VERSION__"></script>
<script defer src="js/tools/inventory.js?v=__VERSION__"></script>

<!-- Bootstrap -->
<script defer src="js/core/app.js?v=__VERSION__"></script>

</body>
</html>
