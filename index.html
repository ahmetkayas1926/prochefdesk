<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/app/">
<title>ProChefDesk</title>
<link rel="canonical" href="https://prochefdesk.com/app/">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #ffffff;
    color: #111;
  }
  .box {
    text-align: center;
    padding: 32px;
  }
  .logo {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    background: #16a34a;
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 16px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; }
  p { color: #666; font-size: 14px; margin: 0 0 16px 0; }
  a { color: #16a34a; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">PC</div>
  <h1>ProChefDesk</h1>
  <p>Loading the app…</p>
  <a href="/app/" id="manualLink">Open app →</a>
</div>
<script>
  // Preserve query params like ?share=xxx so existing public share links still work.
  // Without this, somebody clicking an old prochefdesk.com/?share=abc URL would
  // land on /app/ but lose the share token.
  (function () {
    var qs = window.location.search || '';
    var hash = window.location.hash || '';
    var target = '/app/' + qs + hash;
    // Update manual link too (in case meta refresh is blocked by browser)
    var manual = document.getElementById('manualLink');
    if (manual) manual.href = target;
    // Replace history so back button doesn't loop here
    try { window.location.replace(target); }
    catch (e) { window.location.href = target; }
  })();
</script>
</body>
</html>
