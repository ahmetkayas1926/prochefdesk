<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="ProChefDesk — Kitchen OS for professional chefs. Recipe costing, menu engineering, inventory, and more.">
<title>ProChefDesk — Kitchen OS for Professional Chefs</title>

<!-- PWA manifest -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22ProChefDesk%22%2C%22short_name%22%3A%22ProChefDesk%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%2316a34a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520viewBox%253D%25270%25200%2520100%2520100%2527%253E%253Crect%2520width%253D%2527100%2527%2520height%253D%2527100%2527%2520rx%253D%252722%2527%2520fill%253D%2527%252316a34a%2527%252F%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

<!-- Google Fonts - Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Stylesheets: cache-bust with ?v=2.5.7 on deploy -->
<link rel="stylesheet" href="css/core.css?v=2.5.7">
<link rel="stylesheet" href="css/components.css?v=2.5.7">
<link rel="stylesheet" href="css/mobile.css?v=2.5.7">

<link rel="stylesheet" href="css/print.css?v=2.5.7">
</head>
<body>

<!-- ============= SPLASH (shows while JS loads) ============= -->
<div id="splash" class="splash">
  <div class="splash-logo">
    <div class="splash-mark">PC</div>
    <div class="splash-name">ProChefDesk</div>
    <div class="splash-tag">Kitchen OS</div>
  </div>
  <div class="splash-spinner"></div>
</div>

<!-- ============= APP ROOT (hidden until ready) ============= -->
<div id="app" class="app hidden">

  <!-- ===== TOP BAR (desktop + mobile) ===== -->
  <header id="topbar" class="topbar">
    <button id="btnMenu" class="icon-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
    </button>
    <div class="topbar-brand" data-nav="dashboard">
      <span class="brand-mark">PC</span>
      <span class="brand-name">ProChefDesk</span>
    </div>
    <button id="wsSwitcher" class="ws-switcher" aria-label="Switch workspace">
      <span class="ws-dot" id="wsDot"></span>
      <span class="ws-name" id="wsName">My Kitchen</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="topbar-actions">
      <button id="btnSync" class="icon-btn" aria-label="Sync status" title="Sync status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 3v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btnTheme" class="icon-btn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btnLang" class="icon-btn lang-btn" aria-label="Change language">
        <span id="langLabel">EN</span>
      </button>
      <button id="btnUser" class="icon-btn user-btn" aria-label="Account">
        <span id="userAvatar">👤</span>
      </button>
    </div>
  </header>

  <!-- ===== SIDE NAV (desktop slides in) ===== -->
  <nav id="sidenav" class="sidenav">
    <div class="sidenav-backdrop" data-close-sidenav></div>
    <div class="sidenav-panel">
      <div class="sidenav-header">
        <div class="sidenav-brand">
          <span class="brand-mark">PC</span>
          <span>ProChefDesk</span>
        </div>
        <button class="icon-btn" data-close-sidenav aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="sidenav-items" id="sidenavItems"><!-- populated by app.js --></div>
      <div class="sidenav-footer">
        <div id="planBadge" class="plan-badge plan-free">Free Plan</div>
        <button id="btnUpgrade" class="btn btn-primary btn-sm w-full" data-i18n="upgrade_to_pro">Upgrade to Pro</button>
        <div class="sidenav-legal" style="margin-top:10px;text-align:center;font-size:11px;color:var(--text-3);line-height:1.5;">
          <a href="privacy.html" target="_blank" rel="noopener" data-i18n="legal_privacy" style="color:var(--text-3);text-decoration:none;">Privacy</a>
          <span style="margin:0 4px;">·</span>
          <a href="terms.html" target="_blank" rel="noopener" data-i18n="legal_terms" style="color:var(--text-3);text-decoration:none;">Terms</a>
          <div style="margin-top:2px;opacity:0.7;">v2.5.7</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT AREA ===== -->
  <main id="main" class="main">
    <div id="view" class="view"><!-- current view is rendered here --></div>
  </main>

  <!-- ===== MOBILE BOTTOM NAV ===== -->
  <nav id="bottomnav" class="bottomnav">
    <button class="bn-item active" data-nav="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_home">Home</span>
    </button>
    <button class="bn-item" data-nav="recipes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_recipes">Recipes</span>
    </button>
    <button class="bn-item bn-center" data-nav="tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
    </button>
    <button class="bn-item" data-nav="ingredients">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l3 6 6-6 3 6-3 14H9L6 8l-3-6z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_ingredients">Pantry</span>
    </button>
    <button class="bn-item" data-nav="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4"/></svg>
      <span data-i18n="nav_account">Me</span>
    </button>
  </nav>

  <!-- ===== MODAL STACK HOST ===== -->
  <div id="modalStack" class="modal-stack"></div>

  <!-- ===== TOAST HOST ===== -->
  <div id="toastHost" class="toast-host"></div>

  <!-- ===== OFFLINE BANNER ===== -->
  <div id="offlineBanner" class="offline-banner hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.58 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span data-i18n="offline_mode">Offline — changes will sync when you're back online</span>
  </div>

</div>

<!-- UI primitives -->
